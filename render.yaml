    buildCommand: pip install flask flask-cors groq python-dotenv gunicorn
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT "backend.app:create_app()"
    envVars:
      - key: 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
        sync: false
      - key: FLASK_DEBUG
        value: "false"
    plan: free
